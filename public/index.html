<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しおやゲーム（仮） - エントランス</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 90vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { font-size: 1.5em; color: #333; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; box-sizing: border-box; }
        
        /* 電卓風UIのスタイル */
        .room-display { font-size: 2em; letter-spacing: 10px; background: #eee; padding: 15px; border-radius: 5px; margin-bottom: 15px; min-height: 35px; color: #333; font-family: monospace; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .keypad button { padding: 15px; font-size: 1.2em; background: #f9f9f9; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .keypad button:hover { background: #e0e0e0; }
        .keypad button:active { background: #ccc; }
        .key-c { color: #ff4d4d; font-weight: bold; }
        .key-del { color: #555; font-weight: bold; }
        
        #enter-btn { padding: 15px; background: #333; color: white; border: none; border-radius: 5px; width: 100%; font-size: 1.2em; cursor: pointer; font-weight: bold; }
        #enter-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>しおやゲーム（仮）</h1>

    <div class="input-group">
        <label>あなたのお名前</label>
        <input type="text" id="entry-name" placeholder="名前を入力してください" maxlength="15">
    </div>

    <div class="input-group">
        <label>ルーム番号 (4桁)</label>
        <div class="room-display" id="room-display">----</div>
        <div class="keypad">
            <button onclick="inputDigit('1')">1</button>
            <button onclick="inputDigit('2')">2</button>
            <button onclick="inputDigit('3')">3</button>
            <button onclick="inputDigit('4')">4</button>
            <button onclick="inputDigit('5')">5</button>
            <button onclick="inputDigit('6')">6</button>
            <button onclick="inputDigit('7')">7</button>
            <button onclick="inputDigit('8')">8</button>
            <button onclick="inputDigit('9')">9</button>
            <button onclick="clearDigits()" class="key-c">C</button>
            <button onclick="inputDigit('0')">0</button>
            <button onclick="deleteDigit()" class="key-del">DEL</button>
        </div>
    </div>

    <button id="enter-btn" disabled>入室する</button>
</div>

<script>
    let currentRoomId = "";

    function updateDisplay() {
        const display = document.getElementById('room-display');
        // 4桁未満の場合はハイフンで埋める
        const padded = currentRoomId.padEnd(4, '-');
        display.innerText = padded;
        checkValidity();
    }

    function inputDigit(digit) {
        if (currentRoomId.length < 4) {
            currentRoomId += digit;
            updateDisplay();
        }
    }

    function deleteDigit() {
        if (currentRoomId.length > 0) {
            currentRoomId = currentRoomId.slice(0, -1);
            updateDisplay();
        }
    }

    function clearDigits() {
        currentRoomId = "";
        updateDisplay();
    }

    function checkValidity() {
        const name = document.getElementById('entry-name').value.trim();
        const btn = document.getElementById('enter-btn');
        // 名前が入力されており、かつルーム番号が4桁揃っている場合のみボタンを有効化
        btn.disabled = !(name.length > 0 && currentRoomId.length === 4);
    }

    document.getElementById('entry-name').addEventListener('input', checkValidity);

    document.getElementById('enter-btn').addEventListener('click', () => {
        const name = document.getElementById('entry-name').value.trim();
        if (name && currentRoomId.length === 4) {
            // ★追加: リロードしても本人だと証明するための固有IDを発行
            const clientId = 'client_' + Math.random().toString(36).substr(2, 9);
            window.location.href = `game.html?room=${currentRoomId}&name=${encodeURIComponent(name)}&clientId=${clientId}`;
        }
    });

    // 初期表示の更新
    updateDisplay();
</script>

</body>
</html>
