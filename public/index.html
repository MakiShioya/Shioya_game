<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover">
    <title>しおやゲーム（仮） - エントランス</title>
    
    <!-- しおや将棋のフォントとアイコン設定 -->
    <link rel="preload" href="script/font/setofont.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="icon" href="script/image/komiya_icon.png"> 
    
    <style>
        @font-face {
            font-family: 'SetoFont';
            src: url('script/font/setofont.ttf') format('truetype');
            font-display: block;
        }

        * {
            font-family: 'SetoFont', "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #2c3e50;
            -webkit-user-select: none; user-select: none;
        }

        /* 背景画像の設定 */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100%; z-index: -1;
            background-image: url('script/image/mujin_haikei.PNG');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }

        /* 画面中央に配置するためのオーバーレイ */
        .overlay {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100;
            justify-content: center; align-items: center; overscroll-behavior: none;
        }

        /* モーダル風のメインコンテナ */
        .modal-box {
            position: relative; background: #fff8dc; padding: 25px;
            border-radius: 10px; border: 4px solid #8b4513; text-align: center;
            width: 95%; max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem; color: #8b4513; margin-top: 0; margin-bottom: 20px;
            text-shadow: 1px 1px 0px #fff;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #8b4513; font-size: 1.1rem; }
        
        /* 名前入力欄 */
        input[type="text"] {
            width: 100%; padding: 12px; border: 2px solid #8b4513; border-radius: 8px;
            font-size: 1.2rem; background: #fff; color: #333; text-align: center;
            outline: none;
        }
        input[type="text"]:focus { background: #ECDBBF; }

        /* 電卓風UIのスタイル */
        .room-display {
            font-size: 2.5rem; letter-spacing: 12px; background: #432517; padding: 15px;
            border-radius: 8px; margin-bottom: 15px; min-height: 45px; color: #ECDBBF;
            text-align: center; border: 3px inset #8b4513;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        
        /* テンキーボタン */
        .keypad button {
            padding: 15px 0; font-size: 1.5rem; font-weight: bold;
            background: linear-gradient(to bottom, #8b4513, #5e3522);
            color: #ECDBBF; border: 2px solid #ECDBBF; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px #432517;
        }
        .keypad button:active { transform: scale(0.95); }
        
        /* 特殊キーの色分け */
        .keypad .key-c { background: linear-gradient(to bottom, #e83e8c, #c2185b); }
        .keypad .key-del { background: linear-gradient(to bottom, #6c757d, #495057); }

        /* 入室ボタン */
        #enter-btn {
            padding: 15px; background: linear-gradient(to bottom, #FF9800 0%, #F57C00 100%);
            color: #fff; border: 3px solid #ECDBBF; border-radius: 10px;
            width: 100%; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-shadow: 1px 1px 2px #432517;
            transition: 0.2s;
        }
        #enter-btn:disabled {
            background: #ccc; border-color: #999; color: #666; text-shadow: none;
            cursor: not-allowed; box-shadow: none;
        }
        #enter-btn:not(:disabled):active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="bg-image"></div>

<div class="overlay">
    <div class="modal-box">
        <h1>しおやゲーム（仮）</h1>

        <div class="input-group">
            <label>あなたのお名前</label>
            <input type="text" id="entry-name" placeholder="名前を入力" maxlength="8">
        </div>

        <div class="input-group">
            <label>ルーム番号 (4桁)</label>
            <div class="room-display" id="room-display">----</div>
            <div class="keypad">
                <button onclick="inputDigit('1')">1</button>
                <button onclick="inputDigit('2')">2</button>
                <button onclick="inputDigit('3')">3</button>
                <button onclick="inputDigit('4')">4</button>
                <button onclick="inputDigit('5')">5</button>
                <button onclick="inputDigit('6')">6</button>
                <button onclick="inputDigit('7')">7</button>
                <button onclick="inputDigit('8')">8</button>
                <button onclick="inputDigit('9')">9</button>
                <button onclick="clearDigits()" class="key-c">C</button>
                <button onclick="inputDigit('0')">0</button>
                <button onclick="deleteDigit()" class="key-del">消</button>
            </div>
        </div>

        <button id="enter-btn" disabled>対局室へ入る</button>
    </div>
</div>

<script>
    let currentRoomId = "";

    function updateDisplay() {
        const display = document.getElementById('room-display');
        const padded = currentRoomId.padEnd(4, '-');
        display.innerText = padded;
        checkValidity();
    }

    function inputDigit(digit) {
        if (currentRoomId.length < 4) {
            currentRoomId += digit;
            updateDisplay();
        }
    }

    function deleteDigit() {
        if (currentRoomId.length > 0) {
            currentRoomId = currentRoomId.slice(0, -1);
            updateDisplay();
        }
    }

    function clearDigits() {
        currentRoomId = "";
        updateDisplay();
    }

    function checkValidity() {
        const name = document.getElementById('entry-name').value.trim();
        const btn = document.getElementById('enter-btn');
        btn.disabled = !(name.length > 0 && currentRoomId.length === 4);
    }

    document.getElementById('entry-name').addEventListener('input', checkValidity);

    document.getElementById('enter-btn').addEventListener('click', () => {
        const name = document.getElementById('entry-name').value.trim();
        if (name && currentRoomId.length === 4) {
            const clientId = 'client_' + Math.random().toString(36).substr(2, 9);
            window.location.href = `game.html?room=${currentRoomId}&name=${encodeURIComponent(name)}&clientId=${clientId}`;
        }
    });

    updateDisplay();
</script>

</body>
</html>
