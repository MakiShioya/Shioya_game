<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover">
    <title>しおやミニゲーム - 総合ロビー</title>
    
    <!-- フォントとアイコンの読み込み -->
    <link rel="preload" href="font/setofont.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="icon" href="script/image/komiya_icon.png"> 
    
    <style>
        @font-face {
            font-family: 'SetoFont';
            src: url('font/setofont.ttf') format('truetype');
            font-display: block;
        }

        * {
            font-family: 'SetoFont', "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #2c3e50;
            -webkit-user-select: none; user-select: none;
        }

        /* 背景画像の設定 */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100%; z-index: -1;
            background-image: url('script/image/mujin_haikei.PNG');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }

        /* 画面中央に配置するためのラッパー */
        .screen-wrapper {
            display: flex; justify-content: center; align-items: center;
            min-height: 100%; padding: 15px; overscroll-behavior: none;
        }

        /* モーダル風のメインコンテナ */
        .container {
            background: #fff8dc; padding: 25px; border-radius: 10px;
            border: 4px solid #8b4513; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%; max-width: 600px; max-height: 95vh;
            display: flex; flex-direction: column; overflow-y: auto;
        }

        h1 {
            color: #8b4513; margin-top: 0; text-shadow: 1px 1px 0px #fff;
            text-align: center; font-size: 2rem; margin-bottom: 5px;
        }

        .subtitle {
            text-align: center; color: #5e3522; font-weight: bold;
            font-size: 1.1rem; margin-bottom: 25px;
        }

        /* ゲームリストのコンテナ */
        .game-list {
            display: flex; flex-direction: column; gap: 15px;
            margin-bottom: 20px;
        }

        /* 個別のゲームカード（ボタン） */
        .game-card {
            background: linear-gradient(to right, #ECDBBF, #fff);
            border: 3px solid #8b4513; border-radius: 12px;
            padding: 15px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-align: left;
        }
        .game-card:active {
            transform: scale(0.97); box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }
        .game-card:hover {
            border-color: #d35400; background: linear-gradient(to right, #ffe8c2, #fff);
        }

        /* 準備中のカードスタイル */
        .game-card.disabled {
            background: #e0e0e0; border-color: #999; cursor: not-allowed;
            filter: grayscale(100%); opacity: 0.8;
        }
        .game-card.disabled:active { transform: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .game-card.disabled:hover { border-color: #999; }

        /* カード内のアイコン */
        .game-icon {
            font-size: 3rem; min-width: 60px; text-align: center;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        /* カード内のテキストエリア */
        .game-info { flex: 1; }
        .game-title {
            font-size: 1.4rem; font-weight: bold; color: #8b4513;
            margin-bottom: 5px; border-bottom: 2px dashed #d2b48c; padding-bottom: 5px;
        }
        .game-desc {
            font-size: 0.95rem; color: #555; line-height: 1.4; font-weight: bold;
        }

        /* 戻るボタン */
        .btn-back {
            padding: 15px; background: linear-gradient(to bottom, #6c757d, #495057);
            color: #fff; border: 3px solid #ECDBBF; border-radius: 10px;
            width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-shadow: 1px 1px 2px #333;
        }
        .btn-back:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="bg-image"></div>

<div class="screen-wrapper">
    <div class="container">
        <h1>しおやミニゲーム<br><span style="font-size: 0.6em;">総合ロビー</span></h1>
        <div class="subtitle">遊ぶゲームを選んでください！</div>
        
        <div class="game-list">
            
            <!-- ① 好物当てゲーム（実装済み） -->
            <div class="game-card" onclick="location.href='favorite_guessr.html'">
                <div class="game-icon">🤔</div>
                <div class="game-info">
                    <div class="game-title">好物当てゲーム</div>
                    <div class="game-desc">お互いの「好きなもの」を予想して当て合う、親睦を深める心理戦ゲーム！</div>
                </div>
            </div>

            <!-- ② 準備中（テンプレート用） -->
            <div class="game-card disabled">
                <div class="game-icon">🚧</div>
                <div class="game-info">
                    <div class="game-title">？？？</div>
                    <div class="game-desc">新しいゲームを準備中です。追加をお待ちください！</div>
                </div>
            </div>
            
        </div>

        <button class="btn-back" onclick="location.href='index.html'">タイトル画面へ戻る</button>
    </div>
</div>

</body>
</html>
